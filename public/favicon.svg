<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Compress Video File — film frame + downward compress arrow.
       The rounded rectangle is a video frame; the lens/play eye sits left,
       and a bold down-arrow (shrink / compress) drives through the middle.
       Accent blue #2563eb on transparent; theme-adaptive stroke for the
       SVG favicon (lifts to blue-400 on dark UA backgrounds). -->
  <defs>
    <linearGradient id="cvf-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Film/video frame -->
  <rect x="64" y="118" width="312" height="276" rx="46"
        fill="none" stroke="url(#cvf-grad)" stroke-width="30" class="ink"/>

  <!-- Lens "play" eye on the left third -->
  <circle cx="150" cy="256" r="30" fill="url(#cvf-grad)" class="ink-fill"/>

  <!-- Camera "tape" wedge on the right (the classic video glyph) -->
  <path d="M376 196 L456 142 L456 370 L376 316 Z"
        fill="url(#cvf-grad)" class="ink-fill"/>

  <!-- Bold down-arrow: compress / shrink, centered on the frame -->
  <g stroke="url(#cvf-grad)" stroke-width="30" stroke-linecap="round"
     stroke-linejoin="round" fill="none" class="ink">
    <path d="M236 200 L236 300"/>
    <path d="M196 266 L236 308 L276 266"/>
  </g>

  <style>
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #60a5fa; }
      .ink-fill { fill: #60a5fa; }
    }
  </style>
</svg>
